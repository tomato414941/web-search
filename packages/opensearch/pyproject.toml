[project]
name = "web-search-opensearch"
version = "0.1.0"
description = "OpenSearch integration for PaleBlueSearch"
requires-python = ">=3.11"
dependencies = [
    "opensearch-py>=2.4",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
