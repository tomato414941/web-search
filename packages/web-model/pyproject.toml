[project]
name = "web-search-web-model"
version = "0.1.0"
description = "Web model boundary for known URLs, observed links, and derived graph signals"
requires-python = ">=3.11"
dependencies = [
    "web-search-core",
    "web-search-postgres",
    "psycopg2-binary>=2.9.0",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
web-search-calc-pagerank = "web_search_web_model.cli.calc_pagerank:main"
