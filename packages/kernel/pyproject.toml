[project]
name = "web-search-kernel"
version = "0.1.0"
description = "Search analysis kernel for PaleBlueSearch"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "sudachidict-core",
    "sudachipy",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
