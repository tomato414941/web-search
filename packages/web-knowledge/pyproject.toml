[project]
name = "web-search-web-knowledge"
version = "0.1.0"
description = "Web knowledge boundary for known URLs and observed links"
requires-python = ">=3.11"
dependencies = [
    "web-search-core",
    "web-search-postgres",
    "psycopg2-binary>=2.9.0",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
