groups:
  - name: web-search-service-health
    rules:
      - alert: WebSearchFrontendMetricsDown
        expr: up{job="frontend"} == 0
        for: 2m
        labels:
          severity: critical
          service: frontend
        annotations:
          summary: Frontend metrics target is down
          description: Prometheus could not scrape the frontend metrics endpoint for 2 minutes.

      - alert: WebSearchIndexerApiMetricsDown
        expr: up{job="indexer-api"} == 0
        for: 2m
        labels:
          severity: critical
          service: indexer-api
        annotations:
          summary: Indexer API metrics target is down
          description: Prometheus could not scrape the indexer API metrics endpoint for 2 minutes.

  - name: web-search-pipeline
    rules:
      - alert: WebSearchFrontend5xxRateHigh
        expr: (sum(increase(http_requests_total{job="frontend",status=~"5.."}[10m])) / clamp_min(sum(increase(http_requests_total{job="frontend"}[10m])), 1)) > 0.05 and sum(increase(http_requests_total{job="frontend"}[10m])) > 20
        for: 10m
        labels:
          severity: warning
          service: frontend
        annotations:
          summary: Frontend 5xx rate is elevated
          description: More than 5 percent of frontend requests returned 5xx responses during the last 10 minutes.
