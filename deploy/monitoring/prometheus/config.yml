global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: frontend
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["frontend:8000"]

  - job_name: indexer-api
    metrics_path: /metrics
    static_configs:
      - targets: ["indexer:8000"]

  - job_name: indexer-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["indexer-worker:9000"]

  - job_name: indexer-maintenance-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["indexer-maintenance-worker:9000"]
