global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: frontend
    metrics_path: /metrics
    static_configs:
      - targets: ["frontend:8000"]

  - job_name: indexer-api
    metrics_path: /metrics
    static_configs:
      - targets: ["indexer:8000"]
