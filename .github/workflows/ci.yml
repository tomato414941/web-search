name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-shared:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            shared/setup.py
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e shared/
          pip install -r requirements-dev.txt
      - name: Run shared tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        run: make ci-shared

  test-frontend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            frontend/requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e shared/
          pip install -r frontend/requirements.txt
          pip install -r requirements-dev.txt
      - name: Run frontend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          ADMIN_USERNAME: test
          ADMIN_PASSWORD: test
          ADMIN_SESSION_SECRET: test
          INDEXER_API_KEY: test
        run: make ci-frontend

  test-crawler:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            crawler/requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e shared/
          pip install -r crawler/requirements.txt
          pip install -r requirements-dev.txt
      - name: Run crawler tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          INDEXER_API_KEY: test
        run: make ci-crawler

  test-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            mcp/requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r mcp/requirements.txt
          pip install -r requirements-dev.txt
      - name: Run MCP tests
        run: make ci-mcp

  test-indexer:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            indexer/requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e shared/
          pip install -r indexer/requirements.txt
          pip install -r requirements-dev.txt
      - name: Run indexer tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          INDEXER_API_KEY: test
        run: make ci-indexer

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install linters
        run: pip install ruff==0.15.5
      - name: Run ruff checks
        run: make ci-lint

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit frontend dependencies
        run: grep -v '^-e' frontend/requirements.txt | pip-audit -r /dev/stdin
      - name: Audit crawler dependencies
        run: grep -v '^-e' crawler/requirements.txt | pip-audit -r /dev/stdin
      - name: Audit indexer dependencies
        run: grep -v '^-e' indexer/requirements.txt | pip-audit -r /dev/stdin
      - name: Audit MCP dependencies
        run: grep -v '^-e' mcp/requirements.txt | pip-audit -r /dev/stdin
